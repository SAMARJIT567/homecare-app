name: homecare_app
description: Absolute Choice Homecare time tracking and reporting app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5

  # Networking
  dio: ^5.3.2
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5

  # UI Components
  flutter_svg: ^2.0.9
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^23.2.7
  shimmer: ^3.0.0
  intl: ^0.18.1
  flutter_screenutil: ^5.9.0

  # PDF Generation
  simple_pdf_generator: ^0.2.4

  # Signature
  signature: ^5.4.0

  # Utilities
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.1.14
  image_picker: ^1.0.0

  # For storage permission
  permission_handler: ^11.3.1

  # For directory picker
  file_picker: ^8.1.2

  # For opening files
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/homecare_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/homecare_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/homecare_icon.png